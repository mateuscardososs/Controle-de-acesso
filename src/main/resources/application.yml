server:
  port: 8080

spring:
  application:
    name: access-control-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/access_control}
    username: ${SPRING_DATASOURCE_USERNAME:access_user}
    password: ${SPRING_DATASOURCE_PASSWORD:access_pass}
    hikari:
      pool-name: AccessControlPool
      # 20 conexões suportam: ~10 workers Intelbras simultâneos + ~5 requests HTTP + 5 de folga
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      # Quanto tempo aguardar por uma conexão livre antes de lançar SQLException (30 s)
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      # Conexão ociosa por mais de 10 min é devolvida ao pool
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      # Vida máxima de uma conexão: 30 min (abaixo do default de 8 h do PostgreSQL)
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      # Loga WARNING se uma conexão ficar aberta por mais de 60 s sem ser fechada
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:access_user}
    password: ${SPRING_RABBITMQ_PASSWORD:access_pass}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:8MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    br.com.sport.accesscontrol: INFO

app:
  simulator:
    enabled: ${APP_SIMULATOR_ENABLED:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  intelbras:
    mode: ${APP_INTELBRAS_MODE:fake}
    default-username: ${APP_INTELBRAS_DEFAULT_USERNAME:}
    default-password: ${APP_INTELBRAS_DEFAULT_PASSWORD:}
    timezone: ${APP_TIMEZONE:America/Recife}
    connection-timeout: ${INTELBRAS_CONNECT_TIMEOUT_MS:${APP_INTELBRAS_CONNECTION_TIMEOUT:3s}}
    read-timeout: ${INTELBRAS_READ_TIMEOUT_MS:${APP_INTELBRAS_READ_TIMEOUT:5s}}
    retry-attempts: ${INTELBRAS_RETRY_ATTEMPTS:2}
    retry-backoff: ${INTELBRAS_RETRY_BACKOFF_MS:300ms}
    health-interval: ${INTELBRAS_HEALTH_INTERVAL_SECONDS:30s}
    identity-strategy: ${APP_INTELBRAS_IDENTITY_STRATEGY:document}
    events-polling-enabled: ${APP_INTELBRAS_EVENTS_POLLING_ENABLED:true}
    events-polling-interval: ${INTELBRAS_IMPORT_INTERVAL_SECONDS:${APP_INTELBRAS_EVENTS_POLLING_INTERVAL:5s}}
    dedup-window: ${INTELBRAS_DEDUP_WINDOW_SECONDS:300s}
    face:
      max-bytes: ${INTELBRAS_FACE_MAX_BYTES:97280}
      validation:
        enabled: ${INTELBRAS_FACE_VALIDATION_ENABLED:true}
    sync-reaper:
      # Reenfileira pessoas presas em PENDING_SYNC / SYNCING / SYNC_FAILED recuperável.
      enabled: ${INTELBRAS_SYNC_REAPER_ENABLED:true}
      fixed-delay: ${INTELBRAS_SYNC_REAPER_FIXED_DELAY:5m}
      pending-threshold: ${INTELBRAS_SYNC_REAPER_PENDING_THRESHOLD:5m}
      syncing-threshold: ${INTELBRAS_SYNC_REAPER_SYNCING_THRESHOLD:10m}
      failed-threshold: ${INTELBRAS_SYNC_REAPER_FAILED_THRESHOLD:10m}
      batch-size: ${INTELBRAS_SYNC_REAPER_BATCH_SIZE:100}
      max-failed-requeues: ${INTELBRAS_SYNC_REAPER_MAX_FAILED_REQUEUES:5}
  frontend:
    public-base-url: ${FRONTEND_PUBLIC_BASE_URL:http://localhost:3000}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:no-reply@empresa.local}
  uploads:
    faces-dir: ${FACE_UPLOAD_DIR:uploads/faces}
    # Final file budget for facial controllers (SS 5531 etc.): hard limit ~100 KB, safe target 97 KB.
    faces-max-bytes: ${FACE_UPLOAD_MAX_BYTES:99328}
    faces-max-width: ${FACE_UPLOAD_MAX_WIDTH:640}
    faces-max-height: ${FACE_UPLOAD_MAX_HEIGHT:480}
    faces:
      # Local pre-save face validation (Viola-Jones + quality gate).
      face-margin-ratio: ${FACE_UPLOAD_MARGIN_RATIO:0.6}
      min-face-ratio: ${FACE_UPLOAD_MIN_FACE_RATIO:0.12}
      max-center-offset-ratio: ${FACE_UPLOAD_MAX_CENTER_OFFSET_RATIO:0.34}
      min-brightness: ${FACE_UPLOAD_MIN_BRIGHTNESS:50}
      max-brightness: ${FACE_UPLOAD_MAX_BRIGHTNESS:235}
      min-sharpness: ${FACE_UPLOAD_MIN_SHARPNESS:55}
      min-contrast: ${FACE_UPLOAD_MIN_CONTRAST:20}
      # Heurística conservadora de oclusão da face inferior (mão/objeto cobrindo boca/queixo).
      # Só sinaliza casos grosseiros; a rejeição confiável de oclusão é da controladora Intelbras.
      occlusion-check-enabled: ${FACE_UPLOAD_OCCLUSION_CHECK_ENABLED:true}
      occlusion-min-lower-texture: ${FACE_UPLOAD_OCCLUSION_MIN_LOWER_TEXTURE:12}
      occlusion-lower-upper-ratio: ${FACE_UPLOAD_OCCLUSION_LOWER_UPPER_RATIO:0.25}
  lounges: ${APP_LOUNGES:Front 1,Front 2,Institucional 1,Institucional Vereadores}
  guests:
    invite-expiration-hours: ${GUEST_INVITE_EXPIRATION_HOURS:72}
    expiration-scan-delay-ms: ${GUEST_EXPIRATION_SCAN_DELAY_MS:300000}
  integration:
    intelbras:
      sync:
        max-attempts: ${INTELBRAS_SYNC_MAX_ATTEMPTS:3}
  access:
    release-cooldown-seconds: ${ACCESS_RELEASE_COOLDOWN_SECONDS:15}
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-change-this-secret-please-keep-it-long}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:28800}
