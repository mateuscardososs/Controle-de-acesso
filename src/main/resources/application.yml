server:
  port: 8080

spring:
  application:
    name: access-control-api
  datasource:
    url: jdbc:postgresql://localhost:5432/access_control
    username: access_user
    password: access_pass
  rabbitmq:
    host: localhost
    port: 5672
    username: access_user
    password: access_pass
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    br.com.sport.accesscontrol: INFO

app:
  frontend:
    public-base-url: ${FRONTEND_PUBLIC_BASE_URL:http://localhost:3000}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:no-reply@sport.local}
  uploads:
    faces-dir: ${FACE_UPLOAD_DIR:uploads/faces}
  guests:
    invite-expiration-hours: ${GUEST_INVITE_EXPIRATION_HOURS:72}
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-change-this-secret-please-keep-it-long}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:28800}
