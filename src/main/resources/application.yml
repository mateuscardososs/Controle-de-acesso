server:
  port: 8080

spring:
  application:
    name: access-control-api
  datasource:
    url: jdbc:postgresql://localhost:5432/access_control
    username: access_user
    password: access_pass
  rabbitmq:
    host: localhost
    port: 5672
    username: access_user
    password: access_pass
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    br.com.sport.accesscontrol: INFO

app:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-change-this-secret-please-keep-it-long}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:28800}
