upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8080;
}

# Restaura IP real do cliente quando nginx está atrás do Caddy.
# $remote_addr fica correto para rate limiting e logs.
real_ip_header     X-Forwarded-For;
real_ip_recursive  on;
set_real_ip_from   127.0.0.1;
set_real_ip_from   ::1;
set_real_ip_from   10.0.0.0/8;
set_real_ip_from   172.16.0.0/12;
set_real_ip_from   192.168.0.0/16;

limit_req_zone $binary_remote_addr zone=visitor_registration_per_ip:10m rate=10r/m;

log_format main_sanitized '$remote_addr - $remote_user [$time_local] '
    '"$request_method $uri $server_protocol" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Bloco único: aceita qualquer host, qualquer origem.
# Segurança garantida pelo Spring Security / JWT / RBAC no backend.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10m;
    access_log /var/log/nginx/access.log main_sanitized;
    limit_req_status 429;
    error_page 429 = @visitor_registration_rate_limited;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # ── Healthcheck ─────────────────────────────────────────────────────────
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Observabilidade: bloqueado externamente ──────────────────────────────
    # Acesse Prometheus e Grafana apenas pelas portas 127.0.0.1:9090 e 127.0.0.1:3001
    location ~ ^/(actuator|grafana|prometheus)(/|$) {
        return 404;
    }

    # ── Cadastro público de visitante com rate limit ─────────────────────────
    location = /api/public/visitor-registration {
        client_max_body_size 10m;
        limit_req zone=visitor_registration_per_ip burst=20 nodelay;
        proxy_pass http://backend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Toda a API → backend ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Fotos faciais (servidas pelo backend em /uploads/faces/**) → backend ──
    # Sem este bloco, /uploads/* cairia no location / e iria para o frontend (404).
    location /uploads/ {
        proxy_pass http://backend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket (STOMP / SockJS) → backend ────────────────────────────────
    location /ws {
        proxy_pass http://backend_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location /ws-sockjs {
        proxy_pass http://backend_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ── Resposta de rate limit ───────────────────────────────────────────────
    location @visitor_registration_rate_limited {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "60" always;
        return 429 '{"error":"too_many_requests","message":"Muitas tentativas de cadastro. Aguarde um minuto e tente novamente."}';
    }

    # ── Tudo o mais → frontend ───────────────────────────────────────────────
    # NGINX: qualquer proxy_set_header neste bloco cancela a herança do bloco
    # server. Todos os headers necessários são declarados explicitamente aqui.
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# HTTPS é gerenciado pelo Caddy (ver Caddyfile e docker-compose.prod.yml).
# Este nginx opera atrás do Caddy e não precisa de certificados SSL.
