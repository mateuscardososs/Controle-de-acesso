upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8080;
}

limit_req_zone $binary_remote_addr zone=visitor_registration_per_ip:10m rate=10r/m;

log_format main_sanitized '$remote_addr - $remote_user [$time_local] '
    '"$request_method $uri $server_protocol" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name cadastro.seudominio.com.br;

    client_max_body_size 10m;
    access_log /var/log/nginx/access.log main_sanitized;
    limit_req_status 429;
    error_page 429 = @visitor_registration_rate_limited;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
        limit_except GET {
            deny all;
        }

        proxy_pass http://frontend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /guest-registration/ {
        limit_except GET {
            deny all;
        }

        proxy_pass http://frontend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /guest-registration {
        limit_except GET {
            deny all;
        }

        proxy_pass http://frontend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /_next/static/ {
        limit_except GET {
            deny all;
        }

        proxy_pass http://frontend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /favicon.ico {
        limit_except GET {
            deny all;
        }

        proxy_pass http://frontend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/public/visitor-registration {
        limit_except POST {
            deny all;
        }

        client_max_body_size 10m;
        limit_req zone=visitor_registration_per_ip burst=20 nodelay;
        proxy_pass http://backend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location @visitor_registration_rate_limited {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "60" always;
        return 429 '{"error":"too_many_requests","message":"Muitas tentativas de cadastro. Aguarde um minuto e tente novamente."}';
    }

    location = /api/config/lounges {
        limit_except GET {
            deny all;
        }

        proxy_pass http://backend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/health {
        limit_except GET {
            deny all;
        }

        proxy_pass http://backend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~ ^/(dashboard|logs|logsvisitante|access-events|employees|devices|areas|operations)(/|$) {
        return 404;
    }

    location ~ ^/(api/(auth|admin|access-events|devices|employees|dashboard)(/|$)|actuator(/|$)|ws(/|$)|ws-sockjs(/|$)|grafana(/|$)|prometheus(/|$)) {
        return 404;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.local localhost 127.0.0.1
        ~^10\.
        ~^192\.168\.
        ~^172\.(1[6-9]|2[0-9]|3[0-1])\.;

    allow 127.0.0.1;
    allow ::1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow fc00::/7;
    allow fe80::/10;
    deny all;

    client_max_body_size 10m;
    access_log /var/log/nginx/access.log main_sanitized;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/(actuator|grafana|prometheus)(/|$) {
        return 404;
    }

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /ws {
        proxy_pass http://backend_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location /ws-sockjs {
        proxy_pass http://backend_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

