services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-access_control}
      POSTGRES_USER: ${POSTGRES_USER:-access_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backups_data:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-access_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-access_control}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-access_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
      HIKARI_MAX_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-20}
      HIKARI_MIN_IDLE: ${HIKARI_MIN_IDLE:-5}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-access_user}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq}
      APP_INTELBRAS_MODE: ${APP_INTELBRAS_MODE:-real}
      APP_INTELBRAS_DEFAULT_USERNAME: ${APP_INTELBRAS_DEFAULT_USERNAME:-admin}
      APP_INTELBRAS_DEFAULT_PASSWORD: ${APP_INTELBRAS_DEFAULT_PASSWORD:-}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Recife}
      TZ: ${TZ:-America/Recife}
      INTELBRAS_CONNECT_TIMEOUT_MS: ${INTELBRAS_CONNECT_TIMEOUT_MS:-3000ms}
      INTELBRAS_READ_TIMEOUT_MS: ${INTELBRAS_READ_TIMEOUT_MS:-5000ms}
      INTELBRAS_RETRY_ATTEMPTS: ${INTELBRAS_RETRY_ATTEMPTS:-2}
      INTELBRAS_RETRY_BACKOFF_MS: ${INTELBRAS_RETRY_BACKOFF_MS:-300ms}
      INTELBRAS_HEALTH_INTERVAL_SECONDS: ${INTELBRAS_HEALTH_INTERVAL_SECONDS:-30s}
      INTELBRAS_IMPORT_INTERVAL_SECONDS: ${INTELBRAS_IMPORT_INTERVAL_SECONDS:-5s}
      INTELBRAS_DEDUP_WINDOW_SECONDS: ${INTELBRAS_DEDUP_WINDOW_SECONDS:-300s}
      APP_SIMULATOR_ENABLED: ${APP_SIMULATOR_ENABLED:-false}
      FACE_UPLOAD_DIR: /app/uploads/faces
      # Limite do arquivo final salvo/sincronizado. Intelbras aceita ~100 KB; alvo seguro 97 KB (99328 bytes).
      FACE_UPLOAD_MAX_BYTES: ${FACE_UPLOAD_MAX_BYTES:-99328}
      FACE_UPLOAD_MAX_WIDTH: ${FACE_UPLOAD_MAX_WIDTH:-640}
      FACE_UPLOAD_MAX_HEIGHT: ${FACE_UPLOAD_MAX_HEIGHT:-480}
      INTELBRAS_FACE_VALIDATION_ENABLED: ${INTELBRAS_FACE_VALIDATION_ENABLED:-true}
      LOG_FILE: /app/logs/access-control-api.log
      LOG_MAX_FILE_SIZE: ${LOG_MAX_FILE_SIZE:-50MB}
      LOG_MAX_HISTORY: ${LOG_MAX_HISTORY:-90}
      LOG_TOTAL_SIZE_CAP: ${LOG_TOTAL_SIZE_CAP:-10GB}
      FRONTEND_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      APP_LOUNGES: ${APP_LOUNGES:-Front 1,Front 2,Institucional 1,Institucional Vereadores}
    volumes:
      - uploads_faces:/app/uploads/faces
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/ws}
        NEXT_PUBLIC_SIMULATOR_ENABLED: ${NEXT_PUBLIC_SIMULATOR_ENABLED:-false}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      # Acesso administrativo (LAN/localhost) — Caddy gerencia o tráfego público externo.
      # Acesse o admin via http://IP-DO-SERVIDOR:${ADMIN_HTTP_PORT:-8080}
      - "${ADMIN_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
      - public

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2019/config/ >/dev/null 2>&1 || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - public

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-127.0.0.1:9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
      postgres-exporter:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SMTP_ENABLED: "${GRAFANA_SMTP_ENABLED:-false}"
      GF_SMTP_HOST: "${GRAFANA_SMTP_HOST:-smtp.gmail.com:587}"
      GF_SMTP_USER: "${GRAFANA_SMTP_USER:-}"
      GF_SMTP_PASSWORD: "${GRAFANA_SMTP_PASSWORD:-}"
      GF_SMTP_FROM_ADDRESS: "${GRAFANA_SMTP_FROM_ADDRESS:-}"
      GF_SMTP_FROM_NAME: "${GRAFANA_SMTP_FROM_NAME:-Consuma Catraca}"
      GF_SMTP_STARTTLS_POLICY: "${GRAFANA_SMTP_STARTTLS_POLICY:-MandatoryStartTLS}"
      GRAFANA_ALERT_EMAIL_TO: ${GRAFANA_ALERT_EMAIL_TO:-}
    ports:
      - "${GRAFANA_PORT:-127.0.0.1:3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      DATA_SOURCE_URI: postgres:5432/${POSTGRES_DB:-access_control}?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_USER:-access_user}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:-change-me-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  public:
  internal:

volumes:
  postgres_data:
  rabbitmq_data:
  uploads_faces:
  backend_logs:
  nginx_logs:
  caddy_data:
  caddy_config:
  backups_data:
  prometheus_data:
  grafana_data:
