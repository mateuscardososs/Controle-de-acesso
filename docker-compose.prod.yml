services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-access_control}
      POSTGRES_USER: ${POSTGRES_USER:-access_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-access_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-access_control}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-access_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-access_user}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq}
      APP_INTELBRAS_MODE: ${APP_INTELBRAS_MODE:-real}
      APP_INTELBRAS_DEFAULT_USERNAME: ${APP_INTELBRAS_DEFAULT_USERNAME:-admin}
      APP_INTELBRAS_DEFAULT_PASSWORD: ${APP_INTELBRAS_DEFAULT_PASSWORD:-admin123}
      FACE_UPLOAD_DIR: /app/uploads/faces
      LOG_FILE: /app/logs/access-control-api.log
      FRONTEND_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - uploads_faces:/app/uploads/faces
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/ws}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      # HTTPS futuro: montar certificados e habilitar server 443 no nginx.conf.
      # - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
      # HTTPS futuro:
      # - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
      - public

networks:
  public:
  internal:

volumes:
  postgres_data:
  rabbitmq_data:
  uploads_faces:
  backend_logs:
  nginx_logs:
