apiVersion: 1

groups:
  - orgId: 1
    name: Operacao critica
    folder: Produção Local
    interval: 30s
    rules:
      - uid: backend_down
        title: Backend down
        condition: B
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              expr: 1 - max(up{job="access-control-api"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: Backend sem scrape no Prometheus
          description: O target access-control-api esta down ou sem metricas por pelo menos 1 minuto.

      - uid: postgres_down
        title: PostgreSQL down
        condition: B
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              expr: 1 - max(pg_up)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        labels:
          severity: critical
          component: postgres
        annotations:
          summary: PostgreSQL indisponivel
          description: A metrica pg_up indica banco down ou o exporter deixou de reportar.

      - uid: controller_offline
        title: Controladora offline
        condition: B
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              expr: sum(controller_online_status == bool 0)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          severity: critical
          component: intelbras
        annotations:
          summary: Controladora offline
          description: Uma ou mais controladoras estao reportando controller_online_status igual a 0.

      - uid: intelbras_failures_high
        title: Falhas de comunicação Intelbras
        condition: B
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              expr: sum(increase(controller_communication_failures_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 3
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          severity: warning
          component: intelbras
        annotations:
          summary: Falhas recentes de comunicacao Intelbras
          description: Mais de 3 falhas de comunicacao com controladoras nos ultimos 5 minutos.

      - uid: http_5xx_high
        title: Erros HTTP 5xx
        condition: B
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              expr: sum(increase(http_server_requests_seconds_count{job="access-control-api", status=~"5.."}[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: Erros HTTP 5xx acima do esperado
          description: Mais de 5 respostas HTTP 5xx nos ultimos 5 minutos.

      - uid: denied_access_high
        title: Alto número de acessos negados
        condition: B
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              expr: sum(increase(access_events_denied_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 20
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 1m
        labels:
          severity: warning
          component: access-events
        annotations:
          summary: Muitos acessos negados
          description: Mais de 20 acessos negados nos ultimos 5 minutos.

      - uid: prometheus_target_down
        title: Prometheus target down
        condition: B
        data:
          - refId: A
            datasourceUid: Prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: Prometheus
              expr: sum(1 - up)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        labels:
          severity: critical
          component: prometheus
        annotations:
          summary: Target do Prometheus down
          description: Um ou mais targets do Prometheus estao down por pelo menos 1 minuto.
